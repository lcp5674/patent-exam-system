# ============================================
# 专利审查辅助系统 - MySQL 数据库配置
# 使用方法:
#   docker-compose -f docker-compose.yml -f docker-compose.mysql.yml up -d
# ============================================

version: "3.8"

services:
  # ========================================
  # MySQL 数据库
  # ========================================
  mysql:
    image: mysql:8.0
    container_name: patent-exam-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-patent_exam}
      MYSQL_USER: ${MYSQL_USER:-patent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-patent123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - patent-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
      - --innodb-log-file-size=64M
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-flush-method=O_DIRECT

  # ========================================
  # 后端服务 (重写 DATABASE_URL)
  # ========================================
  backend:
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER:-patent}:${MYSQL_PASSWORD:-patent123}@mysql:3306/${MYSQL_DATABASE:-patent_exam}?charset=utf8mb4
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
    driver: local

networks:
  patent-net:
    external: true
