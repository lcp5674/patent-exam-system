version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: patent-postgres
    restart: always
    environment:
      POSTGRES_DB: patent_exam
      POSTGRES_USER: patent_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-patent_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - patent-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patent_user -d patent_exam"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: patent-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - patent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus向量数据库
  etcd:
    container_name: patent-etcd
    image: quay.io/coreos/etcd:v3.5.5
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - patent-network

  minio:
    container_name: patent-minio
    image: docker.io/minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: always
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - patent-network

  milvus:
    container_name: patent-milvus
    image: docker.io/milvusdb/milvus:v2.4.0
    restart: always
    command: ["milvus", "run"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      QUERY_NODE_GRACEFUL_TIME: "5000"
      COMMON_SECURITY_AUTHORIZATION_ENABLED: "false"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - patent-network

  # 后端API服务
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: patent-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://patent_user:${DB_PASSWORD:-patent_password}@postgres:5432/patent_exam
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
      - DOUBAO_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
      - DOUBAO_DEFAULT_MODEL=doubao-seed-code
      - DEFAULT_AI_PROVIDER=doubao
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=False
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - patent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_BASE_URL=${API_BASE_URL:-/api}
    container_name: patent-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - patent-network

  # Nginx反向代理
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: patent-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - patent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  patent-network:
    driver: bridge
