version: '3.8'

x-common-config: &common-config
  dns:
    - 8.8.8.8
    - 114.114.114.114
    - 223.5.5.5
  dns_opt:
    - timeout:2
    - attempts:3
  extra_hosts:
    - "postgres:172.20.0.2"
    - "redis:172.20.0.3"
    - "etcd:172.20.0.4"
    - "minio:172.20.0.5"
    - "milvus:172.20.0.6"
    - "backend:172.20.0.7"
    - "frontend:172.20.0.8"
    - "nginx:172.20.0.9"
  restart: always

services:
  # PostgreSQL数据库
  postgres:
    <<: *common-config
    image: postgres:16-alpine
    container_name: patent-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: patent_exam
      POSTGRES_USER: patent_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-patent_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      patent-network:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patent_user -d patent_exam"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    <<: *common-config
    image: redis:6.2-alpine
    container_name: patent-redis
    hostname: redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      patent-network:
        ipv4_address: 172.20.0.3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus向量数据库
  etcd:
    <<: *common-config
    container_name: patent-etcd
    image: quay.io/coreos/etcd:v3.5.5
    hostname: etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      patent-network:
        ipv4_address: 172.20.0.4
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    <<: *common-config
    container_name: patent-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    hostname: minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      patent-network:
        ipv4_address: 172.20.0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    <<: *common-config
    container_name: patent-milvus
    image: milvusdb/milvus:v2.4.0
    hostname: milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      QUERY_NODE_GRACEFUL_TIME: "5000"
      COMMON_SECURITY_AUTHORIZATION_ENABLED: "false"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      patent-network:
        ipv4_address: 172.20.0.6
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 后端API服务
  backend:
    <<: *common-config
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: patent-backend
    hostname: backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://patent_user:${DB_PASSWORD:-patent_password}@postgres:5432/patent_exam
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
      - DOUBAO_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
      - DOUBAO_DEFAULT_MODEL=doubao-seed-code
      - DEFAULT_AI_PROVIDER=doubao
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=False
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      patent-network:
        ipv4_address: 172.20.0.7
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    <<: *common-config
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_BASE_URL=${API_BASE_URL:-/api}
    container_name: patent-frontend
    hostname: frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      patent-network:
        ipv4_address: 172.20.0.8

  # Nginx反向代理
  nginx:
    <<: *common-config
    image: nginx:alpine
    container_name: patent-nginx
    hostname: nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      patent-network:
        ipv4_address: 172.20.0.9
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:

# 网络
networks:
  patent-network:
    driver: bridge
    name: patent-exam-system-main_patent-network
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
